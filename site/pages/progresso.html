<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Ligação com o CSS -->
    <link rel="stylesheet" href="../css/progresso.css">

    <title>Progresso dos Cursos</title>
</head>
<body>

    <!-- HEADER -->
    <header>
        <!-- Logo -->
        <div class="logo">
            <img src="../images/logo.png">
        </div>

        <!-- Menu -->
        <nav>
            <a href="index.html">Início</a>
            <a href="cursos.html">Cursos</a>
            <a href="progresso.html">Progresso</a>
        </nav>

        <!-- Login -->
        <a href="login.html" class="login">
            <img src="../images/login.png">
            <span>Acessar</span>
        </a>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main>
        <h1 class="titulo-pagina">Progresso dos Cursos</h1>

        <p id="aviso-login" class="aviso-login">
            Faça login para acompanhar seu progresso.
            <a href="login.html">Acessar</a>
        </p>

        <div class="tabela-container">
            <table>
                <thead>
                    <tr>
                        <th>Curso</th>
                        <th>Progresso</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                    <!-- Linhas preenchidas pelo JavaScript -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="../js/variaveis.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/progresso-pagina.js"></script>

</body>
</html>
